<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISO 9001:2015 İnteraktiv Təlim Portalı</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f4f6fa;
}

.container{
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:320px;
background:#0f172a;
color:white;
padding:20px;
overflow-y:auto;
}

.sidebar h2{
text-align:center;
margin-bottom:20px;
}

.sidebar ul{
list-style:none;
}

.sidebar li{
border-bottom:1px solid #334155;
}

.sidebar button{
width:100%;
background:none;
border:none;
color:white;
text-align:left;
padding:15px 0;
cursor:pointer;
font-size:15px;
}

.sidebar button:hover{
background:#1e293b;
}

.submenu{
display:none;
padding-left:20px;
background:#1e293b;
}

.submenu li{
border:none;
}

.submenu button{
font-size:14px;
padding:10px 0;
}

/* MAIN */
.main{
flex:1;
display:flex;
flex-direction:column;
}

/* TOPBAR */
.topbar{
background:white;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.topnav-left{
display:flex;
gap:20px;
align-items:center;
}

.topnav-left button{
background:none;
border:none;
font-weight:bold;
font-size:15px;
cursor:pointer;
color:#0f172a;
}

.topnav-left button:hover{
color:#2563eb;
}

.logo{
width:160px;
}

/* VIDEO */
.video-wrapper{
padding:20px;
background:white;
}

.video-banner{
width:100%;
height:113px;
object-fit:cover;
border-radius:10px;
}

/* CONTENT */
.content{
padding:25px;
overflow-y:auto;
flex:1;
}

.card{
background:white;
padding:25px;
margin-bottom:20px;
border-radius:12px;
box-shadow:0 3px 12px rgba(0,0,0,0.08);
}

button.main-btn{
padding:12px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

button.main-btn:hover{
background:#1d4ed8;
}

.quiz-option{
display:block;
padding:12px;
background:#f1f5f9;
margin:10px 0;
cursor:pointer;
border-radius:8px;
}

.quiz-option:hover{
background:#dbeafe;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;
}
</style>
</head>
<body>

<div class="container">

<div class="sidebar">
<h2>ISO 9001:2015</h2>

<ul>
<li>
<button onclick="toggleSubmenu('clause4')">4. Kontekst</button>

<ul id="clause4" class="submenu">
<li><button onclick="loadClause4('4.1')">4.1 Daxili/Xarici məsələlər</button></li>
<li><button onclick="loadClause4('4.2')">4.2 Maraqlı tərəflər</button></li>
<li><button onclick="loadClause4('4.3')">4.3 Əhatə dairəsi</button></li>
<li><button onclick="loadClause4('4.4')">4.4 Proses yanaşması</button></li>
</ul>
</li>
</ul>
</div>

<div class="main">

<div class="topbar">
<div class="topnav-left">
<button onclick="showSection('about')">Təlim haqqında</button>
<button onclick="showSection('trainer')">Təlimçi haqqında</button>
<button onclick="showSection('training')">Təlim</button>
<button onclick="showSection('exam')">İmtahan</button>
<button onclick="showSection('certificate')">Sertifikat</button>
</div>

<img class="logo" src="logo.jpg">
</div>

<div class="video-wrapper">
<video class="video-banner" autoplay muted loop>
<source src="video.mp4" type="video/mp4">
</video>
</div>

<div id="content" class="content">
<div class="card">
<h2>Xoş gəlmisiniz</h2>
<p>ISO 9001:2015 interaktiv təlim portalına xoş gəlmisiniz.</p>
</div>
</div>

</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

function toggleSubmenu(id){
let menu=document.getElementById(id);
menu.style.display = menu.style.display==="block" ? "none" : "block";
}

function showSection(section){

let sections={

about:`
<div class="card">
<h2>Təlim haqqında</h2>
<p>Bu təlim ISO 9001 standartının nəzəri və praktiki tətbiqini öyrədir.</p>
</div>`,

trainer:`
<div class="card">
<h2>Təlimçi haqqında</h2>
<p>ISO auditor, məsləhətçi və təlimçi.</p>
</div>`,

training:`
<div class="card">
<h2>Təlim Modulları</h2>
<p>Sol paneldən seçin.</p>
</div>`,

exam:`
<div class="card">
<h2>İmtahan</h2>
<p>Sual: Risk əsaslı düşüncə hansı maddədədir?</p>

<div class="quiz-option" onclick="checkAnswer(this,false)">4-cü maddə</div>
<div class="quiz-option" onclick="checkAnswer(this,true)">6-cı maddə</div>
<div class="quiz-option" onclick="checkAnswer(this,false)">9-cu maddə</div>
</div>`,

certificate:`
<div class="card">
<h2>Sertifikat Generator</h2>

<input id="name" placeholder="Ad">
<input id="surname" placeholder="Soyad">

<button class="main-btn" onclick="generateCertificate()">
Sertifikat yarat
</button>
</div>`
};

document.getElementById("content").innerHTML=sections[section];
document.getElementById("content").scrollTop=0;
}

function loadClause4(subclause){

let content={

"4.1":`
<div class="card">
<h2>4.1 Təşkilatın və onun kontekstinin anlaşılması</h2>

<h3>Standart tələbi:</h3>
<p>Təşkilat öz məqsədlərinə və strateji istiqamətinə təsir edə biləcək daxili və xarici məsələləri müəyyən etməlidir.</p>

<h3>Nəzəri izah:</h3>
<p>Bu maddə təşkilatın fəaliyyət mühitini anlamaq üçündür. Buraya bazar vəziyyəti, qanunvericilik, texnologiya, rəqabət və daxili resurslar daxildir.</p>

<h3>Universitet nümunəsi:</h3>
<p>
Universitetdə tələbə sayının azalması xarici məsələdir.<br>
Akademik heyətin təcrübəsi daxili məsələdir.<br>
Nazirliyin yeni tələbləri xarici kontekstdir.
</p>

<h3>Praktiki sənəd:</h3>
<p>
SWOT Analizi<br>
PESTLE Analizi<br>
Kontekst Analizi
</p>
</div>`,

"4.2":`
<div class="card">
<h2>4.2 Maraqlı tərəflər</h2>
<p>Təşkilat maraqlı tərəfləri və onların tələblərini müəyyən etməlidir.</p>
</div>`,

"4.3":`
<div class="card">
<h2>4.3 QMS Scope</h2>
<p>QMS əhatə dairəsi müəyyən edilməlidir.</p>
</div>`,

"4.4":`
<div class="card">
<h2>4.4 Proses yanaşması</h2>
<p>Input → Process → Output modeli ilə proseslər idarə olunur.</p>
</div>`
};

document.getElementById("content").innerHTML=content[subclause];
document.getElementById("content").scrollTop=0;
}

function checkAnswer(element,correct){
if(correct){
element.style.background="lightgreen";
alert("Doğru cavab");
}else{
element.style.background="salmon";
alert("Yanlış cavab");
}
}

async function generateCertificate(){

const { jsPDF } = window.jspdf;

let name=document.getElementById("name").value.trim();
let surname=document.getElementById("surname").value.trim();

if(!name||!surname){
alert("Ad və Soyad daxil edin");
return;
}

let participantName=name+" "+surname;

const doc=new jsPDF({
orientation:"landscape",
unit:"mm",
format:"a4"
});

const img=new Image();
img.src="certificate-template.png";

img.onload=function(){

doc.addImage(img,"PNG",0,0,297,210);

doc.setFont("times","bold");
doc.setFontSize(20);
doc.text(participantName,148,102,{align:"center"});

const today=new Date().toLocaleDateString();
doc.setFontSize(12);
doc.text(today,35,145);

let certId="MID-"+Date.now();
doc.text(certId,35,153);

doc.save(participantName+"-Certificate.pdf");

};

img.onerror=function(){
alert("certificate-template.png tapılmadı");
};

}

</script>

</body>
</html>
