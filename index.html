/* CERTIFICATE GENERATOR */
async function generateCertificate() {

const { jsPDF } = window.jspdf;

let name = document.getElementById("name").value.trim();
let surname = document.getElementById("surname").value.trim();

if (!name || !surname) {
    alert("Ad v…ô Soyad daxil edin");
    return;
}

let participantName = name + " " + surname;

const doc = new jsPDF({
    orientation: "landscape",
    unit: "mm",
    format: "a4"
});

const img = new Image();
img.src = "certificate-template.png";

img.onload = function () {

    const pageWidth = 297;
    const pageHeight = 210;

    const imgWidth = img.width;
    const imgHeight = img.height;

    /* Aspect ratio qorunur */
    const ratio = Math.min(pageWidth / imgWidth, pageHeight / imgHeight);

    const renderWidth = imgWidth * ratio;
    const renderHeight = imgHeight * ratio;

    /* Ortalama */
    const x = (pageWidth - renderWidth) / 2;
    const y = (pageHeight - renderHeight) / 2;

    /* Ňěablon EXACT olduńüu kimi */
    doc.addImage(
        img,
        "PNG",
        x,
        y,
        renderWidth,
        renderHeight
    );

    /* Ad Soyad (s…ônin template x…ôttin…ô uyńüun) */
    doc.setFont("times", "bold");
    doc.setFontSize(20);
    doc.text(participantName, 148, 102, {
        align: "center"
    });

    /* Tarix */
    const today = new Date().toLocaleDateString();
    doc.setFontSize(12);
    doc.text(today, 35, 145);

    /* Sertifikat ID */
    let certId = "MID-" + Date.now();
    doc.text(certId, 35, 153);

    doc.save(participantName + "-Certificate.pdf");
};

}
