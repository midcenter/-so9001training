<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISO 9001:2015 İnteraktiv Təlim Portalı</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f4f6fa;
}

.container{
display:flex;
height:100vh;
}

/* SOL MENU */
.sidebar{
width:270px;
background:#0f172a;
color:white;
padding:20px;
overflow-y:auto;
}

.sidebar h2{
text-align:center;
margin-bottom:20px;
font-size:22px;
}

.sidebar ul{
list-style:none;
}

.sidebar li{
padding:15px;
border-bottom:1px solid #334155;
cursor:pointer;
transition:.3s;
}

.sidebar li:hover{
background:#1e293b;
}

/* MAIN */
.main{
flex:1;
display:flex;
flex-direction:column;
}

/* TOPBAR */
.topbar{
background:white;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.topnav-left{
display:flex;
gap:35px;
align-items:center;
}

.topnav-left a{
text-decoration:none;
font-weight:bold;
color:#0f172a;
cursor:pointer;
transition:.3s;
}

.topnav-left a:hover{
color:#2563eb;
}

.logo{
width:160px;
}

/* VIDEO */
.video-wrapper{
padding:20px;
background:white;
}

.video-banner{
width:100%;
height:113px;
object-fit:cover;
border-radius:10px;
}

/* CONTENT */
.content{
padding:25px;
overflow-y:auto;
flex:1;
}

.card{
background:white;
padding:25px;
margin-bottom:20px;
border-radius:12px;
box-shadow:0 3px 12px rgba(0,0,0,0.08);
}

.card h2{
margin-bottom:15px;
}

button{
padding:12px 20px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1d4ed8;
}

.quiz-option{
display:block;
padding:12px;
background:#f1f5f9;
margin:10px 0;
cursor:pointer;
border-radius:8px;
}

.quiz-option:hover{
background:#dbeafe;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;
}
</style>
</head>
<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<h2>ISO 9001:2015</h2>
<ul>
<li onclick="loadClause('4')">4. Kontekst</li>
<li onclick="loadClause('5')">5. Liderlik</li>
<li onclick="loadClause('6')">6. Planlaşdırma</li>
<li onclick="loadClause('7')">7. Dəstək</li>
<li onclick="loadClause('8')">8. Əməliyyat</li>
<li onclick="loadClause('9')">9. Qiymətləndirmə</li>
<li onclick="loadClause('10')">10. Təkmilləşdirmə</li>
</ul>
</div>

<!-- MAIN -->
<div class="main">

<!-- TOPBAR -->
<div class="topbar">
<div class="topnav-left">
<a onclick="showSection('about')">Təlim haqqında</a>
<a onclick="showSection('trainer')">Təlimçi haqqında</a>
<a onclick="showSection('training')">Təlim</a>
<a onclick="showSection('exam')">İmtahan</a>
<a onclick="showSection('certificate')">Sertifikat</a>
</div>

<img class="logo" src="logo.jpg">
</div>

<!-- VIDEO -->
<div class="video-wrapper">
<video class="video-banner" autoplay muted loop>
<source src="video.mp4" type="video/mp4">
</video>
</div>

<!-- CONTENT -->
<div id="content" class="content">

<div class="card">
<h2>Xoş gəlmisiniz</h2>
<p>
ISO 9001:2015 interaktiv təlim portalına xoş gəlmisiniz.
</p>
</div>

</div>

</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

/* TOP MENU */
function showSection(section){

let sections = {

about: `
<div class="card">
<h2>Təlim haqqında</h2>
<p>
Bu təlim ISO 9001:2015 standartının tətbiqini öyrədir.
</p>
</div>
`,

trainer: `
<div class="card">
<h2>Təlimçi haqqında</h2>
<p>
ISO auditoru, məsləhətçi və təlimçi.
</p>
</div>
`,

training: `
<div class="card">
<h2>Təlim modulları</h2>
<p>Sol paneldən maddələri seçin.</p>
</div>
`,

exam: `
<div class="card">
<h2>İmtahan</h2>

<p>Sual: Risk əsaslı düşüncə hansı maddədədir?</p>

<div class="quiz-option" onclick="checkAnswer(this,false)">4-cü maddə</div>
<div class="quiz-option" onclick="checkAnswer(this,true)">6-cı maddə</div>
<div class="quiz-option" onclick="checkAnswer(this,false)">9-cu maddə</div>

</div>
`,

certificate: `
<div class="card">
<h2>Sertifikat Generator</h2>

<input id="name" placeholder="Ad">
<input id="surname" placeholder="Soyad">

<button onclick="generateCertificate()">
Sertifikat yarat
</button>

</div>
`

};

document.getElementById("content").innerHTML = sections[section];

}

/* CLAUSES */
function loadClause(clause){

let clauses = {

4: `
<div class="card">
<h2>4. Kontekst</h2>
<p>Təşkilat daxili və xarici məsələləri müəyyən etməlidir.</p>
</div>
`,

5: `
<div class="card">
<h2>5. Liderlik</h2>
<p>Top management öhdəlik götürməlidir.</p>
</div>
`,

6: `
<div class="card">
<h2>6. Planlaşdırma</h2>
<p>Risk və imkanlar müəyyən olunmalıdır.</p>
</div>
`,

7: `
<div class="card">
<h2>7. Dəstək</h2>
<p>Kompetensiya və resurslar.</p>
</div>
`,

8: `
<div class="card">
<h2>8. Əməliyyat</h2>
<p>Əsas proseslərin idarə olunması.</p>
</div>
`,

9: `
<div class="card">
<h2>9. Qiymətləndirmə</h2>
<p>Audit və KPI.</p>
</div>
`,

10: `
<div class="card">
<h2>10. Təkmilləşdirmə</h2>
<p>Davamlı inkişaf.</p>
</div>
`

};

document.getElementById("content").innerHTML = clauses[clause];

}

/* QUIZ */
function checkAnswer(element, correct){
if(correct){
element.style.background="lightgreen";
alert("Doğru cavab");
}else{
element.style.background="salmon";
alert("Yanlış cavab");
}
}

/* CERTIFICATE PDF */
async function generateCertificate(){

const { jsPDF } = window.jspdf;

let name = document.getElementById("name").value.trim();
let surname = document.getElementById("surname").value.trim();

if(!name || !surname){
alert("Ad və soyad daxil edin");
return;
}

let participantName = name + " " + surname;

const doc = new jsPDF("landscape");

doc.setLineWidth(2);
doc.rect(10,10,277,190);

doc.setFont("helvetica","bold");
doc.setFontSize(28);
doc.text("SERTİFİKAT",148,40,{align:"center"});

doc.setFontSize(16);
doc.setFont("helvetica","normal");
doc.text("Bu sertifikat təqdim olunur:",148,65,{align:"center"});

doc.setFontSize(24);
doc.setFont("helvetica","bold");
doc.text(participantName,148,90,{align:"center"});

doc.setFontSize(16);
doc.setFont("helvetica","normal");
doc.text(
"ISO 9001:2015 Keyfiyyət İdarəetmə Sistemi təlimini uğurla tamamladığı üçün",
148,110,{align:"center"}
);

const today = new Date().toLocaleDateString();

doc.text("Tarix: " + today,40,170);
doc.text("Təlimçi: ____________________",190,170);

doc.save(participantName + "-Sertifikat.pdf");

}

</script>

</body>
</html>
