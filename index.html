/* CERTIFICATE GENERATOR */
async function generateCertificate() {

const { jsPDF } = window.jspdf;

let name = document.getElementById("name").value.trim();
let surname = document.getElementById("surname").value.trim();

if (!name || !surname) {
alert("Ad v…ô Soyad daxil edin");
return;
}

let participantName = name + " " + surname;

const doc = new jsPDF("landscape", "mm", "a4");

const img = new Image();
img.src = "certificate-template.png";

img.onload = function () {

/* Full template background */
doc.addImage(img, "PNG", 0, 0, 297, 210);

/* ONLY NAME */
doc.setFont("times", "bold");
doc.setFontSize(20);
doc.text(participantName, 148, 100, { align: "center" });

/* DATE */

doc.setFontSize(11);
doc.text(today, 28, 145);

/* CERTIFICATE ID */
let certId = "MID-" + Date.now();
doc.text(certId, 28, 153);

/* SAVE */
doc.save(participantName + "-Certificate.pdf");

};

}
